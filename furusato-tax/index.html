<!DOCTYPE html>
<html lang="ja">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ふるさと納税 業務管理システム</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">

<body>

        <div class="sidebar-brand-sub">業務管理システム</div>

      <ul class="sidebar-menu">
        <li>

        </li>
        <li>

            <i class="bi bi-upload"></i><span>CSV取込</span>
          </a>
        </li>

        <li class="sidebar-section">売上管理</li>

        <li>
          <a href="#" class="sidebar-link" data-page="overall-sales">
            <i class="bi bi-graph-up-arrow"></i><span>全体売上</span>
          </a>
        </li>
        <li>
          <a href="#" class="sidebar-link municipality-miyazaki" data-page="miyazaki-sales">

          </a>
        </li>
        <li>
          <a href="#" class="sidebar-link municipality-miki" data-page="miki-sales">
            <i class="bi bi-building"></i><span>三木町</span>
          </a>

        <li>
          <a href="#" class="sidebar-link" data-page="kpi-management">
            <i class="bi bi-bullseye"></i><span>KPI管理</span>
          </a>
        </li>

        <li class="sidebar-section">設定</li>

        <li>
          <a href="#" class="sidebar-link" data-page="settings">
            <i class="bi bi-gear"></i><span>設定</span>
          </a>

      </ul>

        <div class="d-flex align-items-center gap-3">
          <button class="btn btn-sm btn-outline-secondary d-lg-none" id="sidebar-toggle">
            <i class="bi bi-list"></i>
          </button>
          <h1 class="page-title mb-0" id="page-title">ダッシュボード</h1>
        </div>
      </header>

      <main id="page-content" class="page-content"></main>

  <div class="toast-container position-fixed bottom-0 end-0 p-3" id="toast-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script src="js/data.js"></script>
